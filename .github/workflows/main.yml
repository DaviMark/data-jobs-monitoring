name: Monitoramento de Vagas

on:
  schedule:
    - cron: '0 11 * * *' # Todo dia às 08:00 AM (Horário de Brasília)
  workflow_dispatch:

jobs:
  job-hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essencial para o push funcionar

    steps:
    - name: Checkout Código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager pandas

    - name: Executar Scraper
      run: python scripts/scraper.py

    - name: Salvar Dados no Repositório
      run: |
        git config --global user.name "Automation Bot"
        git config --global user.email "bot@github.com"
        # Garante que a pasta data existe para o git não dar erro
        mkdir -p data
        git add data/vagas.csv
        # O || exit 0 evita que o workflow marque "erro" se não houver vagas novas para commitar
        git commit -m "Update: Novas vagas [$(date +'%d/%m/%Y')]" || exit 0
        git push